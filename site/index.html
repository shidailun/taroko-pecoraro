<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taroko Dictionary</title>
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="180x180" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">
<link rel="stylesheet" href="style.css">
</head>
<body class="home">
<div id="hero">
  <button id="btn-home" class="icon-btn" title="Home / 回首頁" aria-label="Home"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11.5 12 4l9 7.5"/><path d="M5.5 10v9.5h13V10"/></svg></button>
  <img id="hero-cover" src="cover.png" alt="Essai de dictionnaire taroko-français — Ferdinando Pecoraro (SECMI, Paris, 1977)">
  <div class="hero-search">
    <button id="btn-random" class="icon-btn" title="Random word / 隨機詞條" aria-label="Random word">🎲</button>
    <div class="search-wrap">
      <input id="search" type="search" placeholder="Truku · FR · EN · 中" autocomplete="off" autofocus>
    </div>
  </div>
  <div class="hero-tools">
    <button id="btn-intro" class="icon-btn" title="Introduction / 導言" aria-label="Introduction">📖</button>
    <button id="btn-settings" class="icon-btn" title="Languages / 語言" aria-label="Settings">⚙</button>
    <button id="btn-about" class="icon-btn" title="About / 關於" aria-label="About">ⓘ</button>
  </div>
</div>

<main id="results"></main>

<div id="sheet-backdrop" class="hidden">
  <div id="sheet" role="dialog" aria-modal="true">
    <button id="sheet-home" class="icon-btn hidden" title="Home / 回首頁" aria-label="Home"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11.5 12 4l9 7.5"/><path d="M5.5 10v9.5h13V10"/></svg></button>
    <button id="sheet-close" class="icon-btn" aria-label="Close">✕</button>
    <div id="sheet-content"></div>
  </div>
</div>

<div id="word-preview" class="word-preview hidden"></div>

<script src="entries.js"></script>
<script src="modern_map.js"></script>
<script src="intro.js"></script>
<script src="app.js"></script>
</body>
</html>
